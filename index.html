<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce platform | Premium Storefront</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #fcfcfc;
            --text-main: #121212;
            --text-muted: #666666;
            --accent: #000000;
            --glass: rgba(255, 255, 255, 0.75);
            --border: #eeeeee;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Glassmorphism Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--text-muted);
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .cart-trigger {
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
        }

        .cart-count {
            background: var(--accent);
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 6px;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            width: 100%;
            background: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            margin-bottom: 4rem;
        }

        .hero-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 1.2rem 2.5rem;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* Main E-commerce platform Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
        }

        .search-bar {
            margin: 2rem 0 4rem;
            display: flex;
            justify-content: center;
        }

        #search-input {
            width: 100%;
            max-width: 600px;
            padding: 1rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            background: var(--surface);
        }

        #search-input:focus {
            border-color: var(--accent);
            box-shadow: var(--shadow);
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
            margin-bottom: 100px;
        }

        .product-card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow);
        }

        .product-image-wrap {
            aspect-ratio: 4/5;
            overflow: hidden;
            background: #f9f9f9;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-weight: 500;
            color: var(--accent);
        }

        .add-to-cart-btn {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--accent);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .product-card:hover .add-to-cart-btn {
            opacity: 1;
            transform: translateY(0);
        }

        /* Cart Drawer */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -450px;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--bg);
            box-shadow: -10px 0 50px rgba(0,0,0,0.1);
            z-index: 2000;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .close-cart {
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .cart-item img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .qty-btn {
            border: 1px solid var(--border);
            background: none;
            width: 28px;
            height: 28px;
            cursor: pointer;
            border-radius: 4px;
        }

        .cart-footer {
            border-top: 1px solid var(--border);
            padding-top: 2rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 1500;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        footer {
            background: #f9f9f9;
            padding: 5rem 5%;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            nav { display: none; }
            .hero-content h1 { font-size: 2.5rem; }
            .cart-drawer { max-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">E-commerce platform</div>
        <nav>
            <ul>
                <li><a href="#">Collection E-commerce platform</a></li>
                <li><a href="#">New Arrivals</a></li>
                <li><a href="#">Editorial</a></li>
            </ul>
        </nav>
        <div class="nav-icons">
            <div class="cart-trigger" onclick="toggleCart()">
                BAG <span class="cart-count">0</span>
            </div>
        </div>
    </header>

    <div class="hero">
        <img src="assets/images/products/jacket-4.jpg" alt="Hero" class="hero-img">
        <div class="hero-content">
            <h1 id="hero-title">ESSENTIALS 2026</h1>
            <button class="btn-primary">Explore E-commerce platform</button>
        </div>
    </div>

    <main class="container">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search our E-commerce platform catalogue...">
        </div>

        <div class="product-grid" id="product-grid">
            <!-- Products injected by JS -->
        </div>
    </main>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h3>Your Bag</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div class="cart-items" id="cart-items-container">
            <!-- Cart items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button class="btn-primary" style="width: 100%;">Checkout</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 E-commerce platform Store. Premium minimalist design.</p>
        <p style="margin-top: 10px;">The official E-commerce platform digital experience.</p>
    </footer>

    <script>
        const products = [
            { id: 1, name: "Minimalist Chrono", price: 240, category: "Accessories", img: "assets/images/products/watch-1.jpg" },
            { id: 2, name: "Premium Leather Belt", price: 85, category: "Accessories", img: "assets/images/products/belt.jpg" },
            { id: 3, name: "Urban Utility Jacket", price: 195, category: "Outerwear", img: "assets/images/products/jacket-1.jpg" },
            { id: 4, name: "Classic White Tee", price: 45, category: "Apparel", img: "assets/images/products/clothes-1.jpg" },
            { id: 5, name: "Night Bloom Parfum", price: 120, category: "Grooming", img: "assets/images/products/perfume.jpg" },
            { id: 6, name: "Performance Runner", price: 160, category: "Footwear", img: "assets/images/products/shoe-1.jpg" },
            { id: 7, name: "Tech Knit Shorts", price: 65, category: "Apparel", img: "assets/images/products/shorts-1.jpg" },
            { id: 8, name: "Silver Link Chain", price: 310, category: "Jewellery", img: "assets/images/products/jewellery-1.jpg" },
            { id: 9, name: "Oxford Button Down", price: 85, category: "Apparel", img: "assets/images/products/shirt-1.jpg" },
            { id: 10, name: "Silk Party Wear", price: 299, category: "Occasion", img: "assets/images/products/party-wear-1.jpg" },
            { id: 11, name: "Botanical Shampoo", price: 28, category: "Grooming", img: "assets/images/products/shampoo.jpg" },
            { id: 12, name: "Legacy Sports Cap", price: 40, category: "Sports", img: "assets/images/products/sports-1.jpg" }
        ];

        let cart = JSON.parse(localStorage.getItem('ecommerce_cart')) || [];

        function init() {
            renderProducts(products);
            updateCartUI();
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = products.filter(p => 
                    p.name.toLowerCase().includes(term) || 
                    p.category.toLowerCase().includes(term)
                );
                renderProducts(filtered);
            });
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(product => `
                <div class="product-card">
                    <div class="product-image-wrap">
                        <img src="${product.img}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x500?text=Product'">
                    </div>
                    <div class="product-info">
                        <div class="product-category">${product.category}</div>
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">$${product.price}</div>
                    </div>
                    <button class="add-to-cart-btn" onclick="addToCart(${product.id})">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            saveAndUpdate();
            if(!document.getElementById('cart-drawer').classList.contains('active')) {
                toggleCart();
            }
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                saveAndUpdate();
            }
        }

        function saveAndUpdate() {
            localStorage.setItem('ecommerce_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const counter = document.querySelector('.cart-count');
            const totalEl = document.getElementById('cart-total');

            let total = 0;
            let count = 0;

            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                count += item.quantity;
                return `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="product-price">$${item.price}</div>
                            <div class="cart-item-controls">
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            if (cart.length === 0) {
                container.innerHTML = `<p style="text-align:center; color: var(--text-muted); margin-top: 2rem;">Your Bag is empty.</p>`;
            }

            counter.innerText = count;
            totalEl.innerText = `$${total.toFixed(2)}`;
        }

        // Initialize the E-commerce platform experience
        window.onload = init;

        // Visual header effect on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.style.padding = "0.8rem 5%";
                header.style.background = "rgba(255, 255, 255, 0.95)";
            } else {
                header.style.padding = "1.25rem 5%";
                header.style.background = "var(--glass)";
            }
        });
    </script>
</body>
</html>
