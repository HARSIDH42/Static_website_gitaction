<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce platform | Editorial Storefront</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #1a1a1a;
            --accent: #707070;
            --light-grey: #f5f5f5;
            --border: #eeeeee;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Typography */
        h1, h2, h3 { font-weight: 400; letter-spacing: -0.02em; }
        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }

        /* Layout */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            width: 200px;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .search-input:focus {
            outline: none;
            width: 280px;
            border-color: var(--accent);
        }

        .cart-trigger {
            position: relative;
            padding: 8px;
        }

        .cart-count {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--fg);
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hero */
        .hero {
            padding: 120px 0 60px;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        .hero p {
            color: var(--accent);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            padding: 60px 0;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .image-wrapper {
            aspect-ratio: 4/5;
            background: var(--light-grey);
            overflow: hidden;
            position: relative;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        .product-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .product-meta h3 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .product-meta p {
            color: var(--accent);
            font-size: 0.9rem;
        }

        .price {
            font-weight: 500;
        }

        .add-to-bag {
            width: 100%;
            padding: 14px;
            background: var(--fg);
            color: white;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: var(--transition);
        }

        .add-to-bag:hover {
            background: #333;
        }

        /* Cart Drawer */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: var(--transition);
        }

        .cart-overlay.active {
            display: block;
            opacity: 1;
        }

        .cart-drawer {
            position: fixed;
            right: -450px;
            top: 0;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: white;
            z-index: 1001;
            padding: 40px;
            display: flex;
            flex-direction: column;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 20px;
            margin-bottom: 24px;
            align-items: center;
        }

        .cart-item img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            background: var(--light-grey);
        }

        .cart-item-info h4 {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .qty-btn {
            border: 1px solid var(--border);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .remove-btn {
            font-size: 0.75rem;
            color: var(--accent);
            text-decoration: underline;
        }

        .cart-footer {
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .checkout-btn {
            width: 100%;
            padding: 18px;
            background: var(--fg);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Footer */
        footer {
            padding: 80px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--accent);
            font-size: 0.9rem;
        }

        /* Utility */
        .hidden { display: none; }
        
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .hero h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
            .cart-drawer { max-width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-inner">
            <a href="#" class="brand">E-commerce platform</a>
            
            <div class="nav-links">
                <a href="#">New Arrivals</a>
                <a href="#">Collection</a>
                <div class="search-container">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search curated items...">
                </div>
            </div>

            <button class="cart-trigger" id="cartOpen">
                BAG <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <main class="container">
        <header class="hero">
            <h1>Refined Essentials</h1>
            <p>Thoughtfully designed objects for the modern life, curated by E-commerce platform.</p>
        </header>

        <div class="product-grid" id="productGrid">
            <!-- Products injected by JS -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 E-commerce platform. All rights reserved.</p>
        </div>
    </footer>

    <!-- Cart Drawer -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h3>SHOPPING BAG</h3>
            <button id="cartClose">CLOSE</button>
        </div>
        
        <div class="cart-items" id="cartItems">
            <!-- Cart items injected by JS -->
        </div>

        <div class="cart-footer">
            <div class="total-row">
                <span>Subtotal</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn">Checkout</button>
        </div>
    </div>

    <script>
        // Product Data
        const products = [
            { id: 1, name: "Classic Biker Jacket", price: 295, category: "Outerwear", img: "assets/images/products/jacket-1.jpg" },
            { id: 2, name: "Minimalist Leather Belt", price: 85, category: "Accessories", img: "assets/images/products/belt.jpg" },
            { id: 3, name: "Essential White Shirt", price: 120, category: "Apparel", img: "assets/images/products/shirt-1.jpg" },
            { id: 4, name: "Signature Fragrance", price: 110, category: "Beauty", img: "assets/images/products/perfume.jpg" },
            { id: 5, name: "Silver Chronograph", price: 450, category: "Watches", img: "assets/images/products/watch-1.jpg" },
            { id: 6, name: "Canvas Urban Sneaker", price: 160, category: "Footwear", img: "assets/images/products/shoe-1.jpg" },
            { id: 7, name: "Linen Tailored Shorts", price: 95, category: "Apparel", img: "assets/images/products/shorts-1.jpg" },
            { id: 8, name: "Gold Chain Pendant", price: 210, category: "Jewellery", img: "assets/images/products/jewellery-1.jpg" },
            { id: 9, name: "Technical Shell Jacket", price: 340, category: "Outerwear", img: "assets/images/products/jacket-2.jpg" },
            { id: 10, name: "Modern Sport Sneaker", price: 180, category: "Footwear", img: "assets/images/products/sports-1.jpg" },
            { id: 11, name: "Black Silk Party Dress", price: 280, category: "Party Wear", img: "assets/images/products/party-wear-1.jpg" },
            { id: 12, name: "Premium Cotton Tee", price: 65, category: "Apparel", img: "assets/images/products/clothes-1.jpg" }
        ];

        // State
        let cart = JSON.parse(localStorage.getItem('ecommerce_cart')) || [];

        // DOM Elements
        const productGrid = document.getElementById('productGrid');
        const searchInput = document.getElementById('searchInput');
        const cartDrawer = document.getElementById('cartDrawer');
        const cartOverlay = document.getElementById('cartOverlay');
        const cartOpen = document.getElementById('cartOpen');
        const cartClose = document.getElementById('cartClose');
        const cartItemsContainer = document.getElementById('cartItems');
        const cartCount = document.getElementById('cartCount');
        const cartTotal = document.getElementById('cartTotal');

        // Initialize
        function init() {
            renderProducts(products);
            updateCartUI();
            
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = products.filter(p => 
                    p.name.toLowerCase().includes(term) || 
                    p.category.toLowerCase().includes(term)
                );
                renderProducts(filtered);
            });

            cartOpen.addEventListener('click', toggleCart);
            cartClose.addEventListener('click', toggleCart);
            cartOverlay.addEventListener('click', toggleCart);
        }

        // Render Product Grid
        function renderProducts(items) {
            productGrid.innerHTML = items.map(product => `
                <div class="product-card">
                    <div class="image-wrapper">
                        <img src="${product.img}" alt="${product.name}" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22200%22%20height%3D%22250%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23f5f5f5%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20font-family%3D%22sans-serif%22%20fill%3D%22%23aaa%22%3ENo%20Image%3C%2Ftext%3E%3C%2Fsvg%3E'">
                    </div>
                    <div class="product-info">
                        <div class="product-meta">
                            <h3>${product.name}</h3>
                            <p>${product.category}</p>
                        </div>
                        <div class="price">$${product.price}</div>
                    </div>
                    <button class="add-to-bag" onclick="addToCart(${product.id})">Add to Bag</button>
                </div>
            `).join('');
        }

        // Cart Actions
        window.addToCart = function(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            saveCart();
            updateCartUI();
            if (!cartDrawer.classList.contains('active')) toggleCart();
        };

        window.updateQty = function(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity < 1) {
                    cart = cart.filter(i => i.id !== id);
                }
                saveCart();
                updateCartUI();
            }
        };

        window.removeFromCart = function(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            updateCartUI();
        };

        function saveCart() {
            localStorage.setItem('ecommerce_cart', JSON.stringify(cart));
        }

        function updateCartUI() {
            // Update Counter
            const count = cart.reduce((acc, item) => acc + item.quantity, 0);
            cartCount.innerText = count;

            // Update List
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p style="text-align:center; padding: 40px 0; color: var(--accent);">Your bag is empty.</p>`;
                cartTotal.innerText = `$0.00`;
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>$${item.price}</p>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
                    </div>
                `).join('');

                const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
                cartTotal.innerText = `$${total.toFixed(2)}`;
            }
        }

        function toggleCart() {
            cartDrawer.classList.toggle('active');
            cartOverlay.classList.toggle('active');
            document.body.style.overflow = cartDrawer.classList.contains('active') ? 'hidden' : '';
        }

        // Run E-commerce platform initialization
        init();
    </script>
</body>
</html>
