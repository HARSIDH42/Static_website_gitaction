<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce platform | Premium Storefront</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.8);
            --accent: #000000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        header { 
            position: fixed; top: 0; width: 100%; z-index: 100;
            backdrop-filter: blur(20px); background: var(--glass);
            padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center;
        }

        .hero { height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding-top: 80px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 4rem 5%; }
        
        .card { border-radius: 12px; overflow: hidden; transition: transform 0.4s ease; cursor: pointer; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-info { padding: 1rem; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 4px; transition: opacity 0.3s; }
        .btn:hover { opacity: 0.8; }

        #cart-drawer {
            position: fixed; right: -400px; top: 0; width: 350px; height: 100%;
            background: white; box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 2rem; z-index: 200;
        }
        #cart-drawer.open { right: 0; }
    </style>
</head>
<body>

<header>
    <div class="logo">E-commerce platform</div>
    <nav><input type="text" id="search" placeholder="Search E-commerce platform..."></nav>
    <div id="cart-btn" style="cursor: pointer;">Bag (<span id="count">0</span>)</div>
</header>

<section class="hero">
    <h1>Experience E-commerce platform 2026</h1>
</section>

<main class="product-grid" id="grid">
    <!-- Products generated by JS -->
</main>

<div id="cart-drawer">
    <h2>Your Bag</h2>
    <div id="cart-items"></div>
    <button class="btn" onclick="toggleCart()">Close E-commerce platform Bag</button>
</div>

<script>
    const products = [
        { id: 1, name: "Premium Jacket", img: "assets/images/products/jacket-1.jpg", price: 120 },
        { id: 2, name: "Classic Watch", img: "assets/images/products/watch-1.jpg", price: 250 },
        { id: 3, name: "Modern Sneakers", img: "assets/images/products/shoe-1.jpg", price: 180 },
        { id: 4, name: "Elegant Jewelry", img: "assets/images/products/jewellery-1.jpg", price: 400 }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.img}" alt="${p.name}">
                <div class="card-info">
                    <h3>${p.name}</h3>
                    <p>$${p.price}</p>
                    <button class="btn" onclick="addToCart(${p.id})">Add to Bag</button>
                </div>
            </div>
        `).join('');
        updateCount();
    }

    function addToCart(id) {
        const p = products.find(i => i.id === id);
        cart.push(p);
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCount();
    }

    function updateCount() {
        document.getElementById('count').innerText = cart.length;
    }

    function toggleCart() {
        document.getElementById('cart-drawer').classList.toggle('open');
    }

    document.getElementById('cart-btn').onclick = toggleCart;
    document.getElementById('search').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    };

    render();
</script>
</body>
</html>
