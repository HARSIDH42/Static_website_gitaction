<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce platform | Premium Store</title>
    <style>
        :root { --bg: #f9f9f9; --text: #1a1a1a; --glass: rgba(255,255,255,0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        
        /* Header */
        header { position: sticky; top: 0; backdrop-filter: blur(10px); background: var(--glass); z-index: 100; padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo { font-weight: 800; letter-spacing: -1px; }
        .nav-links a { margin-left: 2rem; text-decoration: none; color: inherit; font-size: 0.9rem; }
        
        /* Hero */
        .hero { padding: 4rem 5%; text-align: center; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 2rem 5%; }
        .product-card { background: #fff; padding: 1rem; transition: transform 0.3s; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 350px; object-fit: cover; background: #eee; }
        .product-card h3 { margin: 1rem 0 0.5rem; }
        
        /* Cart Drawer */
        #cart-drawer { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.3s; padding: 2rem; z-index: 1000; }
        #cart-drawer.open { right: 0; }
        
        button { background: #000; color: #fff; border: none; padding: 0.8rem 1.5rem; cursor: pointer; margin-top: 1rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">E-commerce platform</div>
    <nav class="nav-links">
        <a href="#" onclick="alert('Welcome to E-commerce platform')">Home</a>
        <a href="#" id="cart-btn">Bag (<span id="cart-count">0</span>)</a>
    </nav>
</header>

<section class="hero">
    <h1>E-commerce platform Collection 2026</h1>
</section>

<div class="grid" id="product-grid"></div>

<div id="cart-drawer">
    <h2>Your Bag</h2>
    <div id="cart-items"></div>
    <button onclick="toggleCart()">Close</button>
</div>

<script>
    const products = [
        { id: 1, name: 'Minimalist Watch', img: 'assets/images/products/watch-1.jpg', price: 199 },
        { id: 2, name: 'Premium Jacket', img: 'assets/images/products/jacket-1.jpg', price: 299 },
        { id: 3, name: 'Casual Sneakers', img: 'assets/images/products/shoe-1.jpg', price: 120 },
        { id: 4, name: 'Designer Shirt', img: 'assets/images/products/shirt-1.jpg', price: 89 }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function renderProducts() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = products.map(p => `
            <div class="product-card">
                <img src="${p.img}" alt="${p.name}" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">
                <h3>${p.name}</h3>
                <p>$${p.price}</p>
                <button onclick="addToCart(${p.id})">Add to Bag</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        cart.push(product);
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCart();
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        const container = document.getElementById('cart-items');
        container.innerHTML = cart.map((p, index) => `
            <div style="margin-bottom:1rem">
                <p>${p.name} - $${p.price} <button onclick="removeFromCart(${index})">x</button></p>
            </div>
        `).join('');
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCart();
    }

    function toggleCart() {
        document.getElementById('cart-drawer').classList.toggle('open');
    }

    document.getElementById('cart-btn').onclick = (e) => { e.preventDefault(); toggleCart(); };

    renderProducts();
    updateCart();
</script>

</body>
</html>
