name: OpenRouter Qwen AI Auto Commit and Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-commit-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          pip install requests

      - name: Generate Storefront using OpenRouter (Qwen)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python <<'EOF'
          import os
          import subprocess
          import re
          import requests
          from pathlib import Path

          api_key = os.environ.get("OPENROUTER_API_KEY")

          if not api_key:
              print("Missing OPENROUTER_API_KEY")
              exit(1)

          image_dir = Path("assets/images/products")
          image_dir.mkdir(parents=True, exist_ok=True)

          image_files = [
              f.name for f in image_dir.glob("*")
              if f.suffix.lower() in [".jpg",".jpeg",".png",".webp"]
          ]

          products = []

          for img in image_files:
              name = img.split(".")[0].replace("-", " ").title()
              products.append({
                  "name": name,
                  "image": f"assets/images/products/{img}",
                  "price": "$199"
              })

          product_text = "\n".join(
              f"{p['name']} | {p['image']} | {p['price']}"
              for p in products
          )

          if not product_text:
              product_text = "No products available"

          prompt = f"""
          You are a senior frontend engineer building a modern 2026 ecommerce storefront.

          Use TailwindCSS.

          Products:
          {product_text}

          Generate responsive product cards.

          Output format:

          ---index.html---
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <link href="assets/css/styles.css" rel="stylesheet">
          <script src="https://cdn.tailwindcss.com"></script>
          </head>

          <body class="bg-gray-100">

          <header class="bg-white shadow p-4 flex justify-between">
          <h1 class="text-2xl font-bold">AI Store</h1>
          </header>

          <main class="max-w-7xl mx-auto p-10">

          <div class="grid md:grid-cols-4 gap-8">

          <!-- Product cards -->

          </div>

          </main>

          </body>
          </html>
          """

          response = requests.post(
              "https://openrouter.ai/api/v1/chat/completions",
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
                  "HTTP-Referer": "https://github.com",
                  "X-Title": "AI Storefront Generator"
              },
              json={
                  "model": "qwen/qwen-2.5-7b-instruct:free",
                  "max_tokens": 800,
                  "temperature": 0.7,
                  "messages": [
                      {"role": "user", "content": prompt}
                  ]
              }
          )

          data = response.json()

          if "choices" not in data:
              print("OpenRouter error:", data)
              exit(1)

          output = data["choices"][0]["message"]["content"]

          matches = re.findall(
              r"---(.*?)---\n(.*?)(?=(?:---|$))",
              output,
              re.DOTALL
          )

          if not matches:
              Path("index.html").write_text(output, encoding="utf-8")
          else:
              for filename, content in matches:
                  path = Path(filename.strip())
                  path.parent.mkdir(parents=True, exist_ok=True)
                  path.write_text(content.strip(), encoding="utf-8")

          subprocess.run(["git","config","--global","user.name","openrouter-bot"])
          subprocess.run(["git","config","--global","user.email","bot@example.com"])

          subprocess.run(["git","add","."])

          diff = subprocess.run(["git","diff","--cached","--quiet"])

          if diff.returncode != 0:
              subprocess.run(["git","commit","-m","AI generated storefront"])
              subprocess.run(["git","push"])
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Tailwind
        run: |
          npm install -D tailwindcss @tailwindcss/cli

      - name: Build Tailwind CSS
        run: |
          mkdir -p src
          echo "@tailwind base;@tailwind components;@tailwind utilities;" > src/input.css
          mkdir -p assets/css
          npx tailwindcss -i ./src/input.css -o ./assets/css/styles.css --minify

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__pycache__/*" \
            --exclude "*.py" \
            --delete
