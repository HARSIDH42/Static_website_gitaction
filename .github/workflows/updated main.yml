name: AI Auto Commit and Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-commit-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI to Update Website UI
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python << 'EOF'
          import os
          import subprocess
          import re
          import requests
          from pathlib import Path

          # Detect images
          image_dir = Path("assets/images/products")
          image_dir.mkdir(parents=True, exist_ok=True)

          image_files = [
              f.name for f in image_dir.glob("*")
              if f.suffix.lower() in [".jpg", ".jpeg", ".png", ".webp"]
          ]

          image_list_text = "\n".join(image_files) if image_files else "No images available."

          # Build prompt
          prompt = f"""
          ROLE
          You are a senior frontend engineer building a refined static e-commerce storefront.

          BRAND NAME
          E-commerce platform

          IMPORTANT RULES
          - Replace every instance of "page" with "E-commerce platform"
          - All navigation must reflect the new brand name
          - Use only images from assets/images/products/
          - Available images:
          {image_list_text}
          - Image paths MUST be relative (example: assets/images/products/1.jpg)
          - Do NOT use leading slash (/assets/...)
          - Do NOT invent filenames
          - If image not available, show neutral placeholder block

          FUNCTIONALITY
          - Working Add to Bag (localStorage)
          - Live cart counter
          - Cart modal/drawer
          - Remove item option
          - Quantity increment
          - Live search filtering
          - No page reloads
          - Vanilla JavaScript only
          - All JS inside <script> tag

          LAYOUT
          - Editorial minimal
          - Generous spacing
          - Soft transitions
          - No heavy animations

          OUTPUT FORMAT STRICTLY

          ---index.html---
          <!DOCTYPE html>
          <html>
          ...full working document...
          </html>
          """

          invoke_url = "https://integrate.api.nvidia.com/v1/chat/completions"

          headers = {
              "Authorization": f"Bearer {os.environ['NVIDIA_API_KEY']}",
              "Content-Type": "application/json"
          }

          payload = {
              "model": "moonshotai/kimi-k2.5",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 16384,
              "temperature": 1.0,
              "top_p": 1.0,
              "stream": False
          }

          response = requests.post(invoke_url, headers=headers, json=payload)
          data = response.json()

          output = data["choices"][0]["message"]["content"]

          if not output:
              print("Model returned empty response.")
              exit(0)

          matches = re.findall(
              r"---(.*?)---\n(.*?)(?=(?:---|$))",
              output,
              re.DOTALL
          )

          if not matches:
              print("No properly formatted files returned.")
              exit(0)

          for filename, content in matches:
              path = Path(filename.strip())
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content.strip(), encoding="utf-8")

          subprocess.run(["git", "config", "--global", "user.name", "ai-bot"])
          subprocess.run(["git", "config", "--global", "user.email", "bot@example.com"])
          subprocess.run(["git", "add", "."])

          result = subprocess.run(["git", "diff", "--cached", "--quiet"])

          if result.returncode != 0:
              subprocess.run(["git", "commit", "-m", "AI updated website UI"])
              subprocess.run(["git", "push"])
          else:
              print("No changes detected.")

          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__pycache__/*" \
            --exclude "*.py" \
            --delete
