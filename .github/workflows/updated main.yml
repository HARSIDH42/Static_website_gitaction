name: Gemini AI Auto Commit and Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-commit-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Gemini SDK
        run: pip install --upgrade google-genai

      - name: Run Gemini AI to Update Website UI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import os
          import subprocess
          import re
          from pathlib import Path
          from google import genai

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          # Detect product images
          image_dir = Path("assets/images/products")
          image_dir.mkdir(parents=True, exist_ok=True)

          image_files = [
              f.name for f in image_dir.glob("*")
              if f.suffix.lower() in [".jpg", ".jpeg", ".png", ".webp"]
          ]

          image_list_text = "\n".join(image_files) if image_files else "No images available."

          prompt = f"""
          ROLE
          You are a senior frontend engineer building a premium 2026 modern e-commerce storefront.

          BRAND NAME
          E-commerce platform

          IMPORTANT RULES
          - Replace every instance of "page" with "E-commerce platform"
          - All navigation must reflect the new brand name
          - Use only images from assets/images/products/
          - Available images:
          {image_list_text}
          - Image paths MUST be relative
          - Do NOT invent filenames
          - If image not available show elegant placeholder

          FUNCTIONALITY
          - Add to Bag (localStorage)
          - Live cart counter
          - Animated cart drawer
          - Quantity increment & removal
          - Live search filtering
          - No page reload
          - Vanilla JavaScript only
          - All JS inside <script>

          DESIGN REQUIREMENTS
          - Large hero banner
          - Glassmorphism sticky header
          - Responsive CSS grid
          - Smooth hover transitions
          - Apple / Zara style minimal UI
          - Elegant neutral colors

          OUTPUT FORMAT STRICTLY

          ---index.html---
          <!DOCTYPE html>
          <html>
          FULL WORKING APPLICATION
          </html>
          """

          response = client.models.generate_content(
              model="gemini-3.1-flash-lite-preview",
              contents=prompt
          )

          output = response.text

          print("\n===== GEMINI OUTPUT =====\n")
          print(output[:2000])

          if not output:
              print("Gemini returned empty response")
              exit(0)

          matches = re.findall(
              r"---(.*?)---\n(.*?)(?=(?:---|$))",
              output,
              re.DOTALL
          )

          # fallback if Gemini doesn't follow format
          if not matches:
              print("No formatted files detected. Saving as index.html")
              Path("index.html").write_text(output.strip(), encoding="utf-8")
              matches = [("index.html", output)]

          for filename, content in matches:
              path = Path(filename.strip())
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content.strip(), encoding="utf-8")

          subprocess.run(["git","config","--global","user.name","gemini-bot"])
          subprocess.run(["git","config","--global","user.email","bot@example.com"])

          subprocess.run(["git","add","."])

          result = subprocess.run(["git","diff","--cached","--quiet"])

          if result.returncode != 0:
              subprocess.run(["git","commit","-m","Gemini AI upgraded UI"])
              subprocess.run(["git","push"])
          else:
              print("No changes detected.")

          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__pycache__/*" \
            --exclude "*.py" \
            --delete
