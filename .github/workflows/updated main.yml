name: Gemini AI Auto Commit and Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-commit-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install Gemini SDK
      - name: Install Gemini SDK
        run: pip install --upgrade google-genai

      # Run Gemini to generate UI
      - name: Run Gemini AI to Update Website UI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import os
          import subprocess
          import re
          from pathlib import Path
          from google import genai

          image_dir = Path("assets/images/products")
          image_dir.mkdir(parents=True, exist_ok=True)

          image_files = [
              f.name for f in image_dir.glob("*")
              if f.suffix.lower() in [".jpg",".jpeg",".png",".webp"]
          ]

          image_list_text = "\n".join(image_files) if image_files else "No images available."

          prompt = f"""
          ROLE
          You are a senior frontend engineer building a premium 2026 modern e-commerce storefront.

          DESIGN SYSTEM
          Use TailwindCSS utility classes.

          BRAND NAME
          E-commerce platform

          Available images:
          {image_list_text}

          OUTPUT FORMAT

          ---index.html---
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <link href="assets/css/styles.css" rel="stylesheet">
          </head>
          <body>
          Premium Tailwind UI
          </body>
          </html>
          """

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          response = client.models.generate_content(
              model="gemini-3-flash-preview",
              contents=prompt
          )

          output = response.text

          matches = re.findall(
              r"---(.*?)---\n(.*?)(?=(?:---|$))",
              output,
              re.DOTALL
          )

          for filename, content in matches:
              path = Path(filename.strip())
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content.strip(), encoding="utf-8")

          subprocess.run(["git","config","--global","user.name","gemini-bot"])
          subprocess.run(["git","config","--global","user.email","bot@example.com"])
          subprocess.run(["git","add","."])

          result = subprocess.run(["git","diff","--cached","--quiet"])

          if result.returncode != 0:
              subprocess.run(["git","commit","-m","Gemini AI upgraded UI"])
              subprocess.run(["git","push"])
          else:
              print("No changes detected")
          EOF


      # Node setup for Tailwind
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install Tailwind CLI
      - name: Install Tailwind
        run: |
          npm install -D tailwindcss @tailwindcss/cli

      # Build Tailwind CSS
      - name: Build Tailwind CSS
        run: |
          mkdir -p src
          echo "@tailwind base;@tailwind components;@tailwind utilities;" > src/input.css
          mkdir -p assets/css
          npx tailwindcss -i ./src/input.css -o ./assets/css/styles.css --minify


      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # Deploy static site to S3
      - name: Deploy to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__pycache__/*" \
            --exclude "*.py" \
            --delete
