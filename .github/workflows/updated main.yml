name: Gemini AI Auto Commit and Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-commit-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Gemini SDK
        run: pip install --upgrade google-genai

      - name: Run Gemini AI to Update Website UI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import os
          import subprocess
          import re
          from pathlib import Path
          from google import genai

          image_dir = Path("assets/images/products")
          image_dir.mkdir(parents=True, exist_ok=True)

          image_files = [
              f.name for f in image_dir.glob("*")
              if f.suffix.lower() in [".jpg", ".jpeg", ".png", ".webp"]
          ]

          image_list_text = "\n".join(image_files) if image_files else "No images available."

          prompt = f"""
          ROLE
          You are a senior frontend engineer building a premium 2026 Amazon/Flipkart-style e-commerce storefront.

          BRAND NAME
          E-commerce platform

          IMPORTANT RULES
          - Use only images from assets/images/products/
          - Available images:
          {image_list_text}
          - Image paths must be relative
          - Do NOT invent filenames
          - If missing image, use elegant placeholder
          - Vanilla JavaScript only
          - All JS inside <script>
          - No page reloads

                    ARCHITECTURE REQUIREMENTS

          1. Central JavaScript array called 'products'
             - At least 12 product objects
             - Each object must contain:
               id, name, category, price, discountPrice,
               rating, reviewCount, stock, badge, image

          2. State Management
             - cart = []
             - wishlist = []
             - recentlyViewed = []
             - Persist in localStorage
             - Restore state on page load

          3. Cart System
             - Add to cart
             - Quantity increment/decrement
             - Remove item
             - Subtotal calculation
             - Delivery charge logic
             - Grand total
             - Slide-in animated cart drawer

          4. Filter System
             - Filter by category
             - Filter by price range
             - Sort by price
             - Sort by rating
             - Re-render dynamically

          5. Search System
             - Live search
             - 300ms debounce
             - Search across name and category

          6. Wishlist System
             - Toggle heart icon
             - Wishlist counter
             - Persist state

          7. Checkout Simulation
             - Order summary
             - Random order ID
             - Success modal
             - Clear cart after checkout

          8. Rendering Logic
             - NO hardcoded product cards in HTML
             - All products rendered via renderProducts()
             - Modular functions:
               renderProducts()
               updateCart()
               applyFilters()
               renderWishlist()
          
          
          
          
          
          PRODUCT DATA
          - Generate at least 12 products
          - Each product must include:
            Name, Category, Price, Discounted Price,
            Rating (stars), Review count,
            Stock count, Discount badge,
            Bestseller/Trending badge (some items)

          CORE SHOPPING FEATURES
          - Add to Bag (localStorage persistence)
          - Live cart counter
          - Animated cart drawer (slide from right)
          - Quantity increment/decrement
          - Remove item
          - Dynamic subtotal calculation
          - Delivery charge simulation
          - Grand total calculation
          - Clear cart button

          SEARCH & FILTER
          - Live search with debounce
          - Category filter buttons
          - Sort dropdown (Price low-high, high-low, rating)
          - Price range filter UI
          - Collapsible filter sidebar (mobile responsive)

          PRODUCT EXPERIENCE
          - Rating stars UI
          - Discount % badge
          - Stock indicator (In Stock / Limited / Out of Stock)
          - Wishlist heart toggle
          - Quick view modal
          - Recently viewed section (localStorage)

          CHECKOUT SIMULATION
          - Checkout modal
          - Order summary
          - Fake payment selection UI
          - Order success animation
          - Simulated order ID generation

          DESIGN REQUIREMENTS (Premium 2026 UI)
          - Large hero section with banner slider
          - Glassmorphism sticky header
          - Mega menu dropdown categories
          - Responsive CSS grid layout
          - Modern typography (clean sans-serif stack)
          - Subtle shadow depth & elevation
          - Smooth hover animations
          - Micro-interactions
          - Professional spacing
          - Neutral elegant color palette
          - Mobile-first responsive

          OUTPUT FORMAT STRICTLY

          ---index.html---
          <!DOCTYPE html>
          <html>
          ...complete advanced premium e-commerce website...
          </html>

          IMPORTANT:
          Return ONLY raw HTML.
          No explanations.
          No markdown.
          Start directly with <!DOCTYPE html>
          """

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          response = client.models.generate_content(
              model="gemini-3-flash-preview",
              contents=prompt
          )

          output = response.text

          if not output:
              print("Gemini returned empty response.")
              exit(0)

          matches = re.findall(
              r"---(.*?)---\n(.*?)(?=(?:---|$))",
              output,
              re.DOTALL
          )

          if not matches:
              print("No properly formatted files returned.")
              exit(0)

          for filename, content in matches:
              path = Path(filename.strip())
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content.strip(), encoding="utf-8")

          subprocess.run(["git", "config", "--global", "user.name", "gemini-bot"])
          subprocess.run(["git", "config", "--global", "user.email", "bot@example.com"])
          subprocess.run(["git", "add", "."])

          result = subprocess.run(["git", "diff", "--cached", "--quiet"])

          if result.returncode != 0:
              subprocess.run(["git", "commit", "-m", "Gemini AI upgraded to full marketplace experience"])
              subprocess.run(["git", "push"])
          else:
              print("No changes detected.")

          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__pycache__/*" \
            --exclude "*.py" \
            --delete
