name: AI Auto Commit and Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-commit-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI to Update Website UI
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python << 'EOF'
          import os
          import subprocess
          import re
          import requests
          import time
          from pathlib import Path

          # Detect images
          image_dir = Path("assets/images/products")
          image_dir.mkdir(parents=True, exist_ok=True)

          image_files = [
              f.name for f in image_dir.glob("*")
              if f.suffix.lower() in [".jpg", ".jpeg", ".png", ".webp"]
          ]

          image_list_text = "\n".join(image_files) if image_files else "No images available."

          prompt = f"""
          You are a senior frontend engineer.

          Use only images from assets/images/products/
          Available images:
          {image_list_text}

          Build a minimal static e-commerce index.html with:
          - Add to Bag (localStorage)
          - Live cart counter
          - Cart drawer
          - Quantity increment
          - Remove item
          - Live search
          - No page reload
          - Vanilla JS only

          OUTPUT FORMAT:

          ---index.html---
          <!DOCTYPE html>
          <html>
          ...full working document...
          </html>
          """

          invoke_url = "https://integrate.api.nvidia.com/v1/chat/completions"

          headers = {
              "Authorization": f"Bearer {os.environ['NVIDIA_API_KEY']}",
              "Content-Type": "application/json",
              "Accept": "application/json"
          }

          payload = {
              "model": "meta/llama3-8b-instruct",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 2048,
              "temperature": 0.7,
              "top_p": 0.9,
              "stream": False
          }

          # Retry logic
          for attempt in range(3):
              try:
                  response = requests.post(
                      invoke_url,
                      headers=headers,
                      json=payload,
                      timeout=60
                  )
                  break
              except requests.exceptions.RequestException as e:
                  print(f"Attempt {attempt+1} failed:", e)
                  time.sleep(5)
          else:
              print("All retries failed.")
              exit(1)

          print("Status Code:", response.status_code)

          if response.status_code != 200:
              print("API Error:")
              print(response.text)
              exit(1)

          try:
              data = response.json()
          except Exception:
              print("Invalid JSON response:")
              print(response.text)
              exit(1)

          if "choices" not in data:
              print("Unexpected response format:")
              print(data)
              exit(1)

          output = data["choices"][0]["message"]["content"]

          if not output:
              print("Model returned empty content.")
              exit(0)

          matches = re.findall(
              r"---(.*?)---\n(.*?)(?=(?:---|$))",
              output,
              re.DOTALL
          )

          if not matches:
              print("No formatted files found.")
              exit(0)

          for filename, content in matches:
              path = Path(filename.strip())
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content.strip(), encoding="utf-8")

          subprocess.run(["git", "config", "--global", "user.name", "ai-bot"])
          subprocess.run(["git", "config", "--global", "user.email", "bot@example.com"])
          subprocess.run(["git", "add", "."])

          result = subprocess.run(["git", "diff", "--cached", "--quiet"])

          if result.returncode != 0:
              subprocess.run(["git", "commit", "-m", "AI updated website UI"])
              subprocess.run(["git", "push"])
          else:
              print("No changes detected.")

          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__pycache__/*" \
            --exclude "*.py" \
            --delete
