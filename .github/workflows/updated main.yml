name: Gemini AI Auto Commit and Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-commit-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Gemini SDK
        run: pip install --upgrade google-genai

      - name: Run Gemini AI to Generate Storefront
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import os
          import subprocess
          import re
          from pathlib import Path
          from google import genai

          # Product image directory
          image_dir = Path("assets/images/products")
          image_dir.mkdir(parents=True, exist_ok=True)

          # Detect images
          image_files = [
              f.name for f in image_dir.glob("*")
              if f.suffix.lower() in [".jpg",".jpeg",".png",".webp"]
          ]

          # Convert images to product list
          products = []
          for img in image_files:
              name = img.split(".")[0].replace("-", " ").title()
              products.append({
                  "name": name,
                  "image": f"assets/images/products/{img}",
                  "price": "$199"
              })

          product_text = "\n".join(
              f"{p['name']} | {p['image']} | {p['price']}"
              for p in products
          )

          if not product_text:
              product_text = "No products available"

          prompt = f"""
          ROLE
          You are a senior frontend engineer building a modern 2026 e-commerce storefront.

          DESIGN
          Use TailwindCSS.

          PRODUCTS
          {product_text}

          Create responsive product cards using the images above.

          OUTPUT FORMAT

          ---index.html---
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <link href="assets/css/styles.css" rel="stylesheet">
          <script src="https://cdn.tailwindcss.com"></script>
          </head>

          <body class="bg-gray-100">

          <header class="bg-white shadow p-4 flex justify-between">
          <h1 class="text-2xl font-bold">E-commerce platform</h1>
          </header>

          <main class="max-w-7xl mx-auto p-10">

          <div class="grid md:grid-cols-4 gap-8">

          <!-- AI should generate product cards here -->

          </div>

          </main>

          </body>
          </html>
          """

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          response = client.models.generate_content(
              model="gemini-3-flash-preview",
              contents=prompt
          )

          output = response.text

          if not output:
              print("Gemini returned empty response")
              exit(0)

          matches = re.findall(
              r"---(.*?)---\n(.*?)(?=(?:---|$))",
              output,
              re.DOTALL
          )

          for filename, content in matches:
              path = Path(filename.strip())
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content.strip(), encoding="utf-8")

          subprocess.run(["git","config","--global","user.name","gemini-bot"])
          subprocess.run(["git","config","--global","user.email","bot@example.com"])
          subprocess.run(["git","add","."])

          result = subprocess.run(["git","diff","--cached","--quiet"])

          if result.returncode != 0:
              subprocess.run(["git","commit","-m","AI generated storefront"])
              subprocess.run(["git","push"])

          EOF


      # Setup Node for Tailwind
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install Tailwind CLI
      - name: Install Tailwind
        run: |
          npm install -D tailwindcss @tailwindcss/cli

      # Build Tailwind CSS
      - name: Build Tailwind CSS
        run: |
          mkdir -p src
          echo "@tailwind base;@tailwind components;@tailwind utilities;" > src/input.css
          mkdir -p assets/css
          npx tailwindcss -i ./src/input.css -o ./assets/css/styles.css --minify


      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2


      # Deploy to S3
      - name: Deploy to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__pycache__/*" \
            --exclude "*.py" \
            --delete
