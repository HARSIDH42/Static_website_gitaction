name: AI Auto Commit and Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-commit-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI to Update Website UI
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python << 'EOF'
          import requests, os, subprocess, json
          from pathlib import Path

          # Detect images
          image_dir = Path("assets/images/products")
          image_dir.mkdir(parents=True, exist_ok=True)

          image_files = [
              f.name for f in image_dir.glob("*")
              if f.suffix.lower() in [".jpg", ".jpeg", ".png", ".webp"]
          ]

          image_list_text = "\n".join(image_files) if image_files else "No images available."

          prompt = f"""
          You are a senior frontend engineer building a refined static e-commerce storefront.

          Use only images from assets/images/products/
          Available images:
          {image_list_text}

          Build full working index.html with:
          - Add to Bag (localStorage)
          - Live cart counter
          - Cart drawer
          - Quantity increment
          - Remove item
          - Live search
          - No page reload
          - Vanilla JS only

          Return ONLY raw HTML.
          Start directly with <!DOCTYPE html>
          """

          invoke_url = "https://integrate.api.nvidia.com/v1/chat/completions"
          stream = True

          headers = {
            "Authorization": f"Bearer {os.environ['NVIDIA_API_KEY']}",
            "Accept": "text/event-stream" if stream else "application/json",
            "Content-Type": "application/json"
          }

          payload = {
            "model": "moonshotai/kimi-k2.5",
            "messages": [{"role":"user","content": prompt}],
            "max_tokens": 2048,
            "temperature": 1.0,
            "top_p": 1.0,
            "stream": stream
          }

          response = requests.post(invoke_url, headers=headers, json=payload)

          output = ""

          if stream:
              for line in response.iter_lines():
                  if line:
                      decoded = line.decode("utf-8")

                      if decoded.startswith("data: "):
                          decoded = decoded.replace("data: ", "")

                          if decoded.strip() == "[DONE]":
                              break

                          try:
                              chunk = json.loads(decoded)
                              delta = chunk["choices"][0]["delta"]

                              if "content" in delta:
                                  output += delta["content"]

                          except:
                              pass
          else:
              data = response.json()
              output = data["choices"][0]["message"]["content"]

          if not output.strip():
              print("Model returned empty response.")
              exit(0)

          # Save clean HTML
          Path("index.html").write_text(output.strip(), encoding="utf-8")

          subprocess.run(["git", "config", "--global", "user.name", "ai-bot"])
          subprocess.run(["git", "config", "--global", "user.email", "bot@example.com"])
          subprocess.run(["git", "add", "."])

          result = subprocess.run(["git", "diff", "--cached", "--quiet"])

          if result.returncode != 0:
              subprocess.run(["git", "commit", "-m", "AI updated website UI"])
              subprocess.run(["git", "push"])
          else:
              print("No changes detected.")

          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__pycache__/*" \
            --exclude "*.py" \
            --delete
